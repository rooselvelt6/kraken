name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # -----------------------------------------------------------------------
  # Linux + FreeBSD: cross-compiled on ubuntu-latest via cargo-zigbuild
  # -----------------------------------------------------------------------
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: kraken-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: kraken-linux-aarch64
          - target: armv7-unknown-linux-gnueabihf
            artifact: kraken-linux-armv7
          - target: x86_64-unknown-freebsd
            artifact: kraken-freebsd-x86_64
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build release binary
        run: cargo zigbuild --release -p rusty-claude-cli --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/kraken" "dist/${{ matrix.artifact }}"
          chmod +x "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust/dist/${{ matrix.artifact }}

  # -----------------------------------------------------------------------
  # macOS: native builds on Apple Silicon runner
  # -----------------------------------------------------------------------
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: kraken-macos-aarch64
          - target: x86_64-apple-darwin
            artifact: kraken-macos-x86_64
    runs-on: macos-14
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release binary
        run: cargo build --release -p rusty-claude-cli --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/kraken" "dist/${{ matrix.artifact }}"
          chmod +x "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust/dist/${{ matrix.artifact }}

  # -----------------------------------------------------------------------
  # Windows: native MSVC build
  # -----------------------------------------------------------------------
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact: kraken-windows-x86_64.exe
    runs-on: windows-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release binary
        run: cargo build --release -p rusty-claude-cli

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/kraken.exe" "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust/dist/${{ matrix.artifact }}

  # -----------------------------------------------------------------------
  # Checksums: download all artifacts, generate SHA256SUMS
  # -----------------------------------------------------------------------
  checksums:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum * | tee SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: SHA256SUMS
          path: artifacts/SHA256SUMS

  # -----------------------------------------------------------------------
  # Sign: Cosign keyless signing (Sigstore SLSA L3)
  # -----------------------------------------------------------------------
  sign:
    needs: [checksums]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign all artifacts with Cosign
        run: |
          for f in artifacts/*; do
            [ -f "$f" ] || continue
            cosign sign-blob "$f" \
              --bundle "${f}.cosign.bundle" \
              --yes
          done

      - name: Upload signed bundles
        uses: actions/upload-artifact@v4
        with:
          name: cosign-bundles
          path: artifacts/*.cosign.bundle

  # -----------------------------------------------------------------------
  # Release: create GitHub Release and upload all assets
  # -----------------------------------------------------------------------
  release:
    needs: [checksums, sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true

# cargo-deny configuration for Kraken workspace
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
yanked = "warn"
ignore = [
    # Local crates named same as registry crates — false positives
    "RUSTSEC-2020-0128",
    "RUSTSEC-2021-0006",
    "RUSTSEC-2021-0046",
]

[licenses]
# Allowlist of approved licenses — deny anything else
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    "OpenSSL",
    "MPL-2.0",
    "BSL-1.0",
    "LicenseRef-ring",
]
deny = [
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "GPL-2.0-only",
    "GPL-2.0-or-later",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
]
confidence-threshold = 0.8
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
    # No duplicate crates — single version policy
]
skip = [
    # Allow duplicate when explicitly needed
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
